version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: livestream-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: livestream
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: livestream-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    container_name: livestream-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      PORT: 5000
      DB_HOST: postgres
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: livestream
      DB_PORT: 5432
      JWT_SECRET: change-this-to-a-long-random-string
      CORS_ORIGIN: "*"
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - "5000:5000"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://13.221.43.243:5173/api
        VITE_SOCKET_URL: http://13.221.43.243:5173
    container_name: livestream-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5173:80"

  # Optional: legacy RTMP -> HLS media server, only needed if you also want
  # to support OBS-style external encoders pushing to /live alongside the
  # browser-based WebRTC "Go Live" feature.
  streaming:
    build: ./streaming
    container_name: livestream-rtmp
    restart: unless-stopped
    ports:
      - "1935:1935"
      - "8080:8080"
    profiles:
      - rtmp

volumes:
  pgdata:
