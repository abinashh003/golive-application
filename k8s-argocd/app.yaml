# A single ArgoCD Application syncing the whole k8s/ directory. This
# mirrors the reference repo's per-component Application pattern, but
# since this project's manifests are flat (no per-component subfolder),
# one Application pointed at the k8s/ path covers namespace, secrets,
# backend, frontend, streaming, services, and ingress together.
#
# Replace repoURL with your actual repo URL once this is pushed to GitHub.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: livestream
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/REPLACE_WITH_YOUR_USERNAME/streaming-application.git
    path: k8s
    targetRevision: main
  destination:
    server: https://kubernetes.default.svc
    namespace: livestream
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
