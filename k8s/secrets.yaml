# Non-sensitive config lives in a ConfigMap; anything secret (DB password,
# JWT secret) lives in a Secret instead. Never put credentials in a
# ConfigMap -- ConfigMaps are not encrypted at rest and show up in plain
# text in `kubectl get configmap -o yaml`.
#
# Do NOT commit real values here. In CI (see .github/workflows/), this file
# is generated/patched at deploy time from GitHub Actions secrets, or you
# can apply it manually once with `kubectl apply -f` after filling in real
# values locally (and never committing that filled-in version).
apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
  namespace: livestream
data:
  PORT: "5000"
  DB_HOST: "REPLACE_WITH_RDS_ENDPOINT"
  DB_USER: "postgres"
  DB_NAME: "livestream"
  DB_PORT: "5432"
  CORS_ORIGIN: "*"
  REDIS_HOST: "REPLACE_WITH_ELASTICACHE_ENDPOINT"
  REDIS_PORT: "6379"
---
apiVersion: v1
kind: Secret
metadata:
  name: backend-secret
  namespace: livestream
type: Opaque
stringData:
  DB_PASSWORD: "REPLACE_ME"
  JWT_SECRET: "REPLACE_ME_WITH_A_LONG_RANDOM_STRING"
