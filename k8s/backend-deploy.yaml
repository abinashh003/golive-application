apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-deployment
  namespace: livestream
  labels:
    app: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend-container
          # Replace with your ECR image URI + tag. The CI workflow
          # (.github/workflows/ci-cd.yml) builds and pushes this, then
          # updates this manifest's tag automatically -- ArgoCD picks up
          # the change and syncs it.
          image: REPLACE_WITH_ECR_IMAGE_URI:latest
          ports:
            - containerPort: 5000
          envFrom:
            - configMapRef:
                name: backend-config
            - secretRef:
                name: backend-secret
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
