server {
    listen 80;

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri /index.html;
    }

    # These proxy locations are used when this container sits behind the
    # same origin as the backend (e.g. in the Kubernetes ingress setup in
    # /k8s, where DNS names backend-service / streaming-service resolve
    # inside the cluster). For local docker-compose, the frontend instead
    # talks to the backend directly via VITE_API_URL / VITE_SOCKET_URL, so
    # these blocks are inert unless you put this container behind an
    # ingress that defines those service names.
    location /api {
        proxy_pass http://backend-service:5000;
    }

    location /socket.io/ {
        proxy_pass http://backend-service:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location /hls/ {
        proxy_pass http://streaming-service:8080;
    }
}
